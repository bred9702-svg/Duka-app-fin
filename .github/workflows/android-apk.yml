name: Build Dukwise Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build signed test APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install web dependencies
        run: npm ci

      - name: Validate Supabase build configuration
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          test -n "$VITE_SUPABASE_URL" || { echo "Missing VITE_SUPABASE_URL repository secret"; exit 1; }
          test -n "$VITE_SUPABASE_ANON_KEY" || { echo "Missing VITE_SUPABASE_ANON_KEY repository secret"; exit 1; }

      - name: Validate Android signing configuration
        env:
          DUKWISE_ANDROID_KEYSTORE_BASE64: ${{ secrets.DUKWISE_ANDROID_KEYSTORE_BASE64 }}
          DUKWISE_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.DUKWISE_ANDROID_KEYSTORE_PASSWORD }}
          DUKWISE_ANDROID_KEY_ALIAS: ${{ secrets.DUKWISE_ANDROID_KEY_ALIAS }}
          DUKWISE_ANDROID_KEY_PASSWORD: ${{ secrets.DUKWISE_ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$DUKWISE_ANDROID_KEYSTORE_BASE64" || { echo "Missing DUKWISE_ANDROID_KEYSTORE_BASE64 repository secret"; exit 1; }
          test -n "$DUKWISE_ANDROID_KEYSTORE_PASSWORD" || { echo "Missing DUKWISE_ANDROID_KEYSTORE_PASSWORD repository secret"; exit 1; }
          test -n "$DUKWISE_ANDROID_KEY_ALIAS" || { echo "Missing DUKWISE_ANDROID_KEY_ALIAS repository secret"; exit 1; }
          test -n "$DUKWISE_ANDROID_KEY_PASSWORD" || { echo "Missing DUKWISE_ANDROID_KEY_PASSWORD repository secret"; exit 1; }

      - name: Validate Firebase push configuration
        env:
          DUKWISE_ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.DUKWISE_ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          test -n "$DUKWISE_ANDROID_GOOGLE_SERVICES_JSON_BASE64" || { echo "Missing DUKWISE_ANDROID_GOOGLE_SERVICES_JSON_BASE64 repository secret"; exit 1; }

      - name: Prepare Firebase Android configuration
        env:
          DUKWISE_ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.DUKWISE_ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$DUKWISE_ANDROID_GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
          node -e "const f=require('./android/app/google-services.json'); const clients=f.client||[]; if(!clients.some(c=>c.client_info?.android_client_info?.package_name==='com.dukwise.app')) process.exit(1)"

      - name: Prepare Android signing key
        env:
          DUKWISE_ANDROID_KEYSTORE_BASE64: ${{ secrets.DUKWISE_ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$DUKWISE_ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/dukwise-release.jks"

      - name: Build and sync Capacitor
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run cap:sync

      - name: Build signed Android test APK
        working-directory: android
        env:
          DUKWISE_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/dukwise-release.jks
          DUKWISE_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.DUKWISE_ANDROID_KEYSTORE_PASSWORD }}
          DUKWISE_ANDROID_KEY_ALIAS: ${{ secrets.DUKWISE_ANDROID_KEY_ALIAS }}
          DUKWISE_ANDROID_KEY_PASSWORD: ${{ secrets.DUKWISE_ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Verify APK signature
        run: |
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -n "$APKSIGNER" || { echo "Android apksigner was not found"; exit 1; }
          "$APKSIGNER" verify --verbose android/app/build/outputs/apk/release/app-release.apk

      - name: Upload signed Dukwise test APK
        uses: actions/upload-artifact@v4
        with:
          name: dukwise-android-signed-test-v0.4.0
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish latest signed Dukwise APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk dukwise-latest.apk
          if gh release view dukwise-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload dukwise-latest dukwise-latest.apk --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create dukwise-latest dukwise-latest.apk \
              --prerelease \
              --title "Dukwise Android Test" \
              --notes "Latest signed Dukwise Android test APK." \
              --repo "$GITHUB_REPOSITORY"
          fi
