name: Deploy Dukwise Supabase Backend

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dukwise-supabase-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Apply migrations and deploy Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Supabase deployment configuration
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "Missing SUPABASE_ACCESS_TOKEN repository secret"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "Missing SUPABASE_DB_PASSWORD repository secret"; exit 1; }
          test -n "$SUPABASE_PROJECT_REF" || { echo "Missing SUPABASE_PROJECT_REF repository secret"; exit 1; }

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply pending database migrations
        run: supabase db push --linked

      - name: Deploy push dispatcher
        run: supabase functions deploy dispatch-push --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy Dukwise AI
        run: supabase functions deploy dukwise-ai --project-ref "$SUPABASE_PROJECT_REF"
